[databases]
smartpay = host=postgres port=5432 dbname=smartpay

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 25
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
