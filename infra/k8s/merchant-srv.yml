apiVersion: v1
kind: ConfigMap
metadata:
  name: merchant-srv-config
  namespace: smartpay
data:
  NODE_ENV: production
  PORT: "3003"
  MERCHANT_DATABASE_URL: postgresql://merchant_srv_user:merchant_srv_password@pgbouncer:6432/smartpay?schema=merchants_schema&pgbouncer=true
  MONGO_URI: mongodb://mongodb:27017/smartpay
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchant-srv
  namespace: smartpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: merchant-srv
  template:
    metadata:
      labels:
        app: merchant-srv
    spec:
      containers:
        - name: merchant-srv
          image: ghcr.io/ramioooz/smartpay-merchant-srv:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: merchant-srv-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: merchant-srv
  namespace: smartpay
spec:
  selector:
    app: merchant-srv
  ports:
    - name: http
      port: 3003
      targetPort: 3003
  type: ClusterIP
