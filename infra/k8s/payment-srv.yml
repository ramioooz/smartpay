apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-srv-config
  namespace: smartpay
data:
  NODE_ENV: production
  PORT: "3001"
  PAYMENT_DATABASE_URL: postgresql://payment_srv_user:payment_srv_password@pgbouncer:6432/smartpay?schema=payments_schema&pgbouncer=true
  MONGO_URI: mongodb://mongodb:27017/smartpay
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka:9092
  ROUTING_SRV_URL: http://routing-srv:3004
  FX_SRV_URL: http://fx-srv:3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-srv
  namespace: smartpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-srv
  template:
    metadata:
      labels:
        app: payment-srv
    spec:
      containers:
        - name: payment-srv
          image: ghcr.io/ramioooz/smartpay-payment-srv:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: payment-srv-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-srv
  namespace: smartpay
spec:
  selector:
    app: payment-srv
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  type: ClusterIP
