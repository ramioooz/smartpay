apiVersion: v1
kind: ConfigMap
metadata:
  name: fx-srv-config
  namespace: smartpay
data:
  NODE_ENV: production
  PORT: "3002"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka:9092
  FX_PRIMARY_PROVIDER: frankfurter
  FX_FALLBACK_PROVIDER: simulated
  FRANKFURTER_BASE_URL: https://api.frankfurter.dev/v1
  FX_RATE_REFRESH_INTERVAL_MS: "5000"
  FX_RATE_CACHE_TTL_SECONDS: "30"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-srv
  namespace: smartpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fx-srv
  template:
    metadata:
      labels:
        app: fx-srv
    spec:
      containers:
        - name: fx-srv
          image: ghcr.io/ramioooz/smartpay-fx-srv:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: fx-srv-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fx-srv
  namespace: smartpay
spec:
  selector:
    app: fx-srv
  ports:
    - name: http
      port: 3002
      targetPort: 3002
  type: ClusterIP
