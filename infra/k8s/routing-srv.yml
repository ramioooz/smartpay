apiVersion: v1
kind: ConfigMap
metadata:
  name: routing-srv-config
  namespace: smartpay
data:
  NODE_ENV: production
  PORT: "3004"
  ROUTING_DATABASE_URL: postgresql://routing_srv_user:routing_srv_password@pgbouncer:6432/smartpay?schema=routing_schema&pgbouncer=true
  MONGO_URI: mongodb://mongodb:27017/smartpay
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-srv
  namespace: smartpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: routing-srv
  template:
    metadata:
      labels:
        app: routing-srv
    spec:
      containers:
        - name: routing-srv
          image: ghcr.io/ramioooz/smartpay-routing-srv:latest
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: routing-srv-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: routing-srv
  namespace: smartpay
spec:
  selector:
    app: routing-srv
  ports:
    - name: http
      port: 3004
      targetPort: 3004
  type: ClusterIP
