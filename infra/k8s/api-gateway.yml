apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: smartpay
data:
  NODE_ENV: production
  PORT: "3000"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  PAYMENT_SRV_URL: http://payment-srv:3001
  FX_SRV_URL: http://fx-srv:3002
  MERCHANT_SRV_URL: http://merchant-srv:3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smartpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/ramioooz/smartpay-api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: api-gateway-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: smartpay
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartpay-api
  namespace: smartpay
spec:
  ingressClassName: nginx
  rules:
    - host: smartpay.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
