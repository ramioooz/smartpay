worker_processes auto;

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream api_gateway_upstream {
    zone api_gateway_upstream 64k;
    least_conn;
    server api-gateway:3000 resolve;
    keepalive 32;
  }

  log_format smartpay_json escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"request_time":$request_time,'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_status":"$upstream_status",'
      '"upstream_response_time":"$upstream_response_time",'
      '"request_id":"$request_id"'
    '}';

  access_log /var/log/nginx/access.log smartpay_json;
  error_log /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection '';
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;

    location / {
      proxy_pass http://api_gateway_upstream;
    }
  }
}
