services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - '${PGBOUNCER_PORT:-6432}:6432'
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - ./infra/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ['CMD-SHELL', "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list || exit 1']
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: smartpay-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  api-gateway:
    profiles: ['app']
    build:
      context: .
      dockerfile: packages/api-gateway/Dockerfile
    expose:
      - '3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PAYMENT_SRV_URL: http://payment-srv:3001
      FX_SRV_URL: http://fx-srv:3002
      MERCHANT_SRV_URL: http://merchant-srv:3003
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    profiles: ['app']
    image: nginx:1.27-alpine
    ports:
      - '${NGINX_PORT:-3000}:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_started

  payment-srv:
    profiles: ['app']
    build:
      context: .
      dockerfile: packages/payment-srv/Dockerfile
    ports:
      - '${PAYMENT_SRV_PORT:-3001}:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      PAYMENT_DATABASE_URL: postgresql://${PAYMENT_DB_USER}:${PAYMENT_DB_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?schema=payments_schema&pgbouncer=true
      MONGO_URI: ${MONGO_URI}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      PAYMENT_SRV_URL: ${PAYMENT_SRV_URL:-http://payment-srv:3001}
      ROUTING_HEALTH_POLL_INTERVAL_MS: ${ROUTING_HEALTH_POLL_INTERVAL_MS:-30000}
      ROUTING_HEALTH_POLL_TIMEOUT_MS: ${ROUTING_HEALTH_POLL_TIMEOUT_MS:-5000}
      ROUTING_HEALTH_POLL_RETRIES: ${ROUTING_HEALTH_POLL_RETRIES:-2}
      ROUTING_HEALTH_POLL_BASE_DELAY_MS: ${ROUTING_HEALTH_POLL_BASE_DELAY_MS:-250}
      ROUTING_SRV_URL: http://routing-srv:3004
      FX_SRV_URL: http://fx-srv:3002
    depends_on:
      pgbouncer:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fx-srv:
    profiles: ['app']
    build:
      context: .
      dockerfile: packages/fx-srv/Dockerfile
    ports:
      - '${FX_SRV_PORT:-3002}:3002'
    environment:
      NODE_ENV: development
      PORT: 3002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      FX_PRIMARY_PROVIDER: ${FX_PRIMARY_PROVIDER}
      FX_FALLBACK_PROVIDER: ${FX_FALLBACK_PROVIDER}
      FRANKFURTER_BASE_URL: ${FRANKFURTER_BASE_URL}
      FX_RATE_REFRESH_INTERVAL_MS: ${FX_RATE_REFRESH_INTERVAL_MS}
      FX_RATE_CACHE_TTL_SECONDS: ${FX_RATE_CACHE_TTL_SECONDS}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  merchant-srv:
    profiles: ['app']
    build:
      context: .
      dockerfile: packages/merchant-srv/Dockerfile
    ports:
      - '${MERCHANT_SRV_PORT:-3003}:3003'
    environment:
      NODE_ENV: development
      PORT: 3003
      MERCHANT_DATABASE_URL: postgresql://${MERCHANT_DB_USER}:${MERCHANT_DB_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?schema=merchants_schema&pgbouncer=true
      MONGO_URI: ${MONGO_URI}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on:
      pgbouncer:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  routing-srv:
    profiles: ['app']
    build:
      context: .
      dockerfile: packages/routing-srv/Dockerfile
    ports:
      - '${ROUTING_SRV_PORT:-3004}:3004'
    environment:
      NODE_ENV: development
      PORT: 3004
      ROUTING_DATABASE_URL: postgresql://${ROUTING_DB_USER}:${ROUTING_DB_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?schema=routing_schema&pgbouncer=true
      MONGO_URI: ${MONGO_URI}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on:
      pgbouncer:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  reconciliation-srv:
    profiles: ['app']
    build:
      context: .
      dockerfile: packages/reconciliation-srv/Dockerfile
    ports:
      - '${RECONCILIATION_SRV_PORT:-3005}:3005'
    environment:
      NODE_ENV: development
      PORT: 3005
      MONGO_URI: ${MONGO_URI}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
